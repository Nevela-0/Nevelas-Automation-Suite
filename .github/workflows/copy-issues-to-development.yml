name: Copy issues to development repo

on:
  issues:
    types:
      - opened
      - reopened

permissions:
  contents: read
  issues: write

jobs:
  copy:
    runs-on: ubuntu-latest

    steps:
      - name: Create or find matching development issue
        id: copy
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.DEV_REPO_ISSUE_TOKEN }}
          result-encoding: string
          script: |
            const owner = "Nevela-0";
            const sourceRepo = "Nevelas-Automation-Suite";
            const targetRepo = "NAS-Development";
            const sourceIssue = context.payload.issue;
            const sourceBody = sourceIssue.body || "";
            const marker = `<!-- nas-live-source repo ${sourceRepo} issue ${sourceIssue.number} -->`;
            const query = `repo:${owner}/${targetRepo} "${marker}" in:body type:issue`;

            const existing = await github.rest.search.issuesAndPullRequests({ q: query });
            if (existing.data.total_count > 0) {
              core.notice(`Development issue already exists: ${existing.data.items[0].html_url}`);
              return existing.data.items[0].html_url;
            }

            function escapeRegExp(value) {
              return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            }

            function readIssueFormValue(heading) {
              const pattern = new RegExp(`### ${escapeRegExp(heading)}\\s+([\\s\\S]*?)(?=\\n### |$)`, "i");
              const match = sourceBody.match(pattern);
              return match?.[1]?.trim() || "";
            }

            const sourceLabels = sourceIssue.labels.map((label) => label.name);
            const targetLabels = new Set(["status: needs testing", "priority: normal"]);

            if (sourceLabels.includes("bug")) targetLabels.add("type: bug");
            if (sourceLabels.includes("enhancement")) targetLabels.add("type: feature");
            if (sourceLabels.includes("documentation")) targetLabels.add("type: docs");

            const reportType = readIssueFormValue("Report type");
            if (/bug/i.test(reportType)) targetLabels.add("type: bug");
            if (/enhancement/i.test(reportType)) targetLabels.add("type: feature");

            const areaMap = new Map([
              ["Buffs", "area: buffs"],
              ["Spellbook", "area: spellbook"],
              ["Spellcasting", "area: spellcasting"],
              ["Metamagic", "area: metamagic"],
              ["Conditions", "area: conditions"],
              ["Combat", "area: combat"],
              ["Damage", "area: damage"],
              ["Defenses", "area: defenses"],
              ["On struck", "area: on struck"],
              ["Temp HP", "area: temp hp"],
              ["Lighting / vision", "area: lighting"],
              ["UI / settings", "area: ui"],
              ["Compatibility", "area: compatibility"],
              ["Packs / content", "area: packs"],
              ["Release / install", "area: release"]
            ]);

            const featureArea = readIssueFormValue("Related feature area");
            const areaLabel = areaMap.get(featureArea);
            if (areaLabel) targetLabels.add(areaLabel);

            const impact = readIssueFormValue("Impact");
            if (/blocks a game|major workflow/i.test(impact)) {
              targetLabels.delete("priority: normal");
              targetLabels.add("priority: high");
            } else if (/minor issue|nice-to-have/i.test(impact)) {
              targetLabels.delete("priority: normal");
              targetLabels.add("priority: low");
            }

            const body = [
              marker,
              "",
              `Public source issue: ${sourceIssue.html_url}`,
              "",
              "---",
              "",
              sourceBody || "_No body provided._"
            ].join("\n");

            const created = await github.rest.issues.create({
              owner,
              repo: targetRepo,
              title: sourceIssue.title,
              body,
              labels: Array.from(targetLabels)
            });

            return created.data.html_url;

      - name: Comment on live issue
        uses: actions/github-script@v7
        env:
          DEVELOPMENT_ISSUE_URL: ${{ steps.copy.outputs.result }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.issue.number;
            const marker = `<!-- nas-development-sync:${issue_number} -->`;
            const developmentIssueUrl = process.env.DEVELOPMENT_ISSUE_URL;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            if (comments.some((comment) => comment.body?.includes(marker))) {
              core.notice("Live issue already has a development sync comment.");
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: `${marker}\nCopied to the private development tracker.`
            });
```
