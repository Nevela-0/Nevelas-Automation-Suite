name: User report
description: Report a bug or request an enhancement for Nevela's Automation Suite.
title: "[Report]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this. Clear reproduction details make it much easier to confirm what is happening and get it fixed.

  - type: dropdown
    id: report-type
    attributes:
      label: Report type
      description: Is this a bug report or an enhancement request?
      options:
        - Bug report
        - Enhancement request
        - Unsure
    validations:
      required: true

  - type: input
    id: foundry-version
    attributes:
      label: Foundry core version
      description: Include the full Foundry version shown in Setup or Configure Settings.
      placeholder: "Example: 12.331"
    validations:
      required: true

  - type: input
    id: pf1e-version
    attributes:
      label: PF1E system version
      description: Include the Pathfinder 1e system version installed in Foundry.
      placeholder: "Example: 11.7"
    validations:
      required: true

  - type: input
    id: nas-version
    attributes:
      label: Nevela's Automation Suite version
      description: Include the module version shown in Manage Modules or the module manifest.
      placeholder: "Example: 1.2.3"
    validations:
      required: true

  - type: dropdown
    id: feature-area
    attributes:
      label: Related feature area
      description: Pick the closest area. If more than one applies, mention the rest in the description.
      options:
        - Buffs
        - Spellbook
        - Spellcasting
        - Metamagic
        - Conditions
        - Combat
        - Damage
        - Defenses
        - On struck
        - Temp HP
        - Lighting / vision
        - UI / settings
        - Compatibility
        - Packs / content
        - Release / install
        - Other / unsure
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Briefly describe the issue or request.
      placeholder: Tell us what happened or what you would like the module to support.
    validations:
      required: true

  - type: textarea
    id: current-behavior
    attributes:
      label: Current behavior
      description: For bugs, what happens now? For enhancements, what limitation are you running into?
      placeholder: Describe the current behavior, missing support, or confusing workflow.
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected or desired behavior
      description: What did you expect to happen instead?
      placeholder: Describe the correct result or the workflow you want to enable.
    validations:
      required: true

  - type: textarea
    id: reproduction-steps
    attributes:
      label: Steps to reproduce
      description: Required for bugs when possible. For enhancements, describe the workflow or use case.
      placeholder: |
        1. Create or open ...
        2. Configure ...
        3. Click or roll ...
        4. See ...
    validations:
      required: false

  - type: textarea
    id: minimal-setup
    attributes:
      label: Minimal setup needed to reproduce
      description: List the actor, item, buff, spell, settings, targets, or combat state needed to recreate this.
      placeholder: |
        Actor:
        Item/spell/buff:
        Module settings:
        Target or combat setup:
    validations:
      required: false

  - type: textarea
    id: active-modules
    attributes:
      label: Other active modules
      description: List other active modules if they may affect this behavior. If you tested with only NAS active, say so.
      placeholder: |
        - Module name and version
        - Module name and version
    validations:
      required: false

  - type: dropdown
    id: client
    attributes:
      label: Foundry client
      description: Where did you see this happen?
      options:
        - Foundry desktop app
        - Chrome
        - Firefox
        - Edge
        - Other browser
        - Server-side / no client involved
        - Unsure
    validations:
      required: false

  - type: textarea
    id: console-errors
    attributes:
      label: Console errors
      description: Paste relevant browser console or Foundry server errors, if any.
      render: text
      placeholder: Paste errors here, or write "No console errors seen."
    validations:
      required: false

  - type: textarea
    id: screenshots-logs
    attributes:
      label: Screenshots, logs, or exports
      description: Attach screenshots, short videos, logs, actor/item exports, or other files that help explain the report.
      placeholder: Drag files here or paste links.
    validations:
      required: false

  - type: dropdown
    id: impact
    attributes:
      label: Impact
      description: How much does this affect play or module use?
      options:
        - Blocks a game or major workflow
        - Breaks a feature but has a workaround
        - Minor issue or confusing behavior
        - Nice-to-have improvement
        - Unsure
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      description: Please confirm what you can before submitting.
      options:
        - label: I checked whether this issue has already been reported.
          required: true
        - label: I tested with the latest NAS version available to me.
          required: true
        - label: For a bug report, I included reproduction steps or explained why I cannot reproduce it consistently.
          required: false
